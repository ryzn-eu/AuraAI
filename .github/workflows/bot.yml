name: Aura Oracle Bot

on:
  schedule:
    # Esegue il bot ogni ora al minuto 0 (es. 10:00, 11:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # Questo pulsante ci permetterà di avviarlo a comando!

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installa pacchetti
        run: npm install

      - name: Avvia Aura Oracle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
